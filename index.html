<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>提案書ライブラリ｜エステティック通信</title>
<style>
  :root {
    --primary: #1a2e4a;
    --accent: #c9a84c;
    --accent-light: #f5edda;
    --text: #1e1e1e;
    --muted: #666;
    --bg: #f8f7f4;
    --white: #ffffff;
    --border: #e0ddd5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.7;
    min-height: 100vh;
  }

  .header {
    background: var(--primary);
    color: white;
    padding: 36px 40px 28px;
  }
  .header-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .header h1 {
    font-size: 22px;
    font-weight: 800;
    line-height: 1.4;
  }
  .header p {
    font-size: 13px;
    opacity: 0.65;
    margin-top: 6px;
  }

  .wrap {
    max-width: 800px;
    margin: 0 auto;
    padding: 36px 24px 60px;
  }

  .section-title {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--accent);
    border-bottom: 2px solid var(--accent);
    padding-bottom: 6px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .proposal-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 40px;
  }

  .proposal-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-left: 4px solid var(--accent);
    border-radius: 8px;
    padding: 18px 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    text-decoration: none;
    color: inherit;
    transition: box-shadow 0.15s;
  }
  .proposal-card:hover {
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
  }
  .proposal-card-info {}
  .proposal-card-client {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--accent);
    margin-bottom: 3px;
  }
  .proposal-card-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--primary);
    line-height: 1.4;
  }
  .proposal-card-meta {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }
  .proposal-card-arrow {
    font-size: 20px;
    color: var(--accent);
    flex-shrink: 0;
  }

  .empty-state {
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-size: 13px;
    background: var(--white);
    border: 1px dashed var(--border);
    border-radius: 8px;
  }

  .footer {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    padding: 24px;
    border-top: 1px solid var(--border);
  }
</style>
</head>
<body>
